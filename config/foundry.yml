foundry:
  name: "The Foundry"
  version: "1.2.0"

iteration:
  max_idea_retries: 10
  max_revision_rounds: 20
  max_test_fix_cycles: 25
  ideation_burst_count: 3
  curator_interval: 8
  domain_cooldown: 10
  novelty_window: 20
  complexity_profiles:
    S:
      max_tokens_per_phase: 32768
      budget_warning_threshold: 25000
    M:
      max_tokens_per_phase: 65536
      budget_warning_threshold: 120000
    L:
      max_tokens_per_phase: 90000
      budget_warning_threshold: 400000
    XL:
      max_tokens_per_phase: 180000
      budget_warning_threshold: 800000

projects:
  max_active: 4
  max_iterations_per_project: 30
  allow_standalone_interrupts: true
  kickstart_after: 15

streaks:
  min_length_for_amplify: 2
  cooldown_after_break: 2
  high_rating_threshold: 3.5
  rating_break_threshold: 3.0

complexity:
  yield_window: 20
  min_samples_for_confidence: 3
  high_confidence_samples: 5

stoker:
  enabled: true
  run_interval: 5
  refinery_token_heat_window: 5
  refinery_token_heat_threshold: 200000

speculative:
  enabled: true
  max_carried_ideas: 2

refinery:
  enabled: true
  min_iterations_between_runs: 5
  max_refinery_queue: 1

monitor:
  active_warning_window: 10

stimuli:
  enabled: true
  stimuli_ttl: 30
  skills_per_context: 8
  mcp_timeout_seconds: 30

context:
  journal_compressed_max_tokens: 24000
  portfolio_index_max_entries: 120
  critic_review_history: 20
  critic_gate1_history: 12

intervention:
  requests_file: "requests.md"
  stop_file: "STOP"

logging:
  log_all_prompts: true
  log_token_usage: true
  log_decisions: true
  log_test_reports: true

recovery:
  checkpoint_every: 1
  resume_on_crash: true

loop:
  cooldown_seconds: 0
  disk_space_min_gb: 1
  concurrency: 8

git:
  auto_commit: true
  auto_push: false
