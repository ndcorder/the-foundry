// ── Physics simulation ───────────────────────────────────────────
class Simulation {
  constructor(nodes, edges) {
    this.nodes = nodes.map(n => ({
      ...n,
      x: Math.random() * 800 - 400,
      y: Math.random() * 600 - 300,
      vx: 0, vy: 0,
      radius: this.ratingToRadius(n.rating),
      color: DOMAIN_COLORS[n.domain] || '#808080'
    }));
    this.edges = edges;
    this.nodeMap = {};
    this.nodes.forEach(n => this.nodeMap[n.id] = n);
    this.alpha = 1.0;
    this.alphaDecay = 0.003;
    this.alphaMin = 0.001;
    this.settled = false;
  }

  ratingToRadius(r) {
    // Map 3.0-5.0 to 4-14px
    return 4 + ((r - 3.0) / 2.0) * 10;
  }

  tick() {
    if (this.alpha < this.alphaMin) {
      this.settled = true;
      return;
    }

    const nodes = this.nodes;
    const damping = 0.85;

    // Repulsion (all pairs)
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        let dx = b.x - a.x, dy = b.y - a.y;
        let dist = Math.sqrt(dx * dx + dy * dy) || 1;
        let force = -800 * this.alpha / (dist * dist);
        let fx = (dx / dist) * force;
        let fy = (dy / dist) * force;
        a.vx -= fx; a.vy -= fy;
        b.vx += fx; b.vy += fy;
      }
    }

    // Attraction (edges)
    for (const e of this.edges) {
      const a = this.nodeMap[e.from], b = this.nodeMap[e.to];
      if (!a || !b) continue;
      let dx = b.x - a.x, dy = b.y - a.y;
      let dist = Math.sqrt(dx * dx + dy * dy) || 1;
      let targetDist = 120 / (e.strength || 0.5);
      let force = (dist - targetDist) * 0.01 * this.alpha * (e.strength || 0.5);
      let fx = (dx / dist) * force;
      let fy = (dy / dist) * force;
      a.vx += fx; a.vy += fy;
      b.vx -= fx; b.vy -= fy;
    }

    // Centering force
    for (const n of nodes) {
      n.vx -= n.x * 0.002 * this.alpha;
      n.vy -= n.y * 0.002 * this.alpha;
    }

    // Constellation clustering — gentle pull toward constellation centroid
    for (const c of LINEAGE_DATA.constellations) {
      const members = c.artifact_ids.map(id => this.nodeMap[id]).filter(Boolean);
      if (members.length < 2) continue;
      let cx = 0, cy = 0;
      members.forEach(m => { cx += m.x; cy += m.y; });
      cx /= members.length; cy /= members.length;
      for (const m of members) {
        m.vx += (cx - m.x) * 0.005 * this.alpha;
        m.vy += (cy - m.y) * 0.005 * this.alpha;
      }
    }

    // Apply velocity
    for (const n of nodes) {
      n.vx *= damping;
      n.vy *= damping;
      n.x += n.vx;
      n.y += n.vy;
    }

    this.alpha = Math.max(this.alpha - this.alphaDecay, 0);
  }

  reheat(amount = 0.3) {
    this.alpha = Math.max(this.alpha, amount);
    this.settled = false;
  }
}

// ── Convex hull ──────────────────────────────────────────────────
function convexHull(points) {
  if (points.length < 3) return points.slice();
  points = points.slice().sort((a, b) => a.x - b.x || a.y - b.y);
  const cross = (O, A, B) => (A.x - O.x) * (B.y - O.y) - (A.y - O.y) * (B.x - O.x);
  const lower = [];
  for (const p of points) {
    while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) lower.pop();
    lower.push(p);
  }
  const upper = [];
  for (let i = points.length - 1; i >= 0; i--) {
    const p = points[i];
    while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) upper.pop();
    upper.push(p);
  }
  upper.pop(); lower.pop();
  return lower.concat(upper);
}

// Expand hull outward by padding
function expandHull(hull, padding) {
  if (hull.length < 3) return hull;
  let cx = 0, cy = 0;
  hull.forEach(p => { cx += p.x; cy += p.y; });
  cx /= hull.length; cy /= hull.length;
  return hull.map(p => {
    const dx = p.x - cx, dy = p.y - cy;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    return { x: p.x + (dx / dist) * padding, y: p.y + (dy / dist) * padding };
  });
}

// ── Renderer ─────────────────────────────────────────────────────
class Renderer {
  constructor(canvas, sim) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.sim = sim;
    this.dpr = window.devicePixelRatio || 1;
    this.panX = 0;
    this.panY = 0;
    this.zoom = 1.0;
    this.hoveredNode = null;
    this.selectedNode = null;
    this.selectedConstellation = null;
    this.mouseX = 0;
    this.mouseY = 0;
    this.isDragging = false;
    this.dragStartX = 0;
    this.dragStartY = 0;
    this.dragNode = null;
    this.animFrame = 0;

    this.resize();
    this.bindEvents();
  }

  resize() {
    const w = window.innerWidth, h = window.innerHeight;
    this.canvas.width = w * this.dpr;
    this.canvas.height = h * this.dpr;
    this.canvas.style.width = w + 'px';
    this.canvas.style.height = h + 'px';
    this.width = w;
    this.height = h;
  }

  worldToScreen(wx, wy) {
    return [
      (wx * this.zoom + this.panX) + this.width / 2,
      (wy * this.zoom + this.panY) + this.height / 2
    ];
  }

  screenToWorld(sx, sy) {
    return [
      (sx - this.width / 2 - this.panX) / this.zoom,
      (sy - this.height / 2 - this.panY) / this.zoom
    ];
  }

  findNodeAt(sx, sy) {
    const [wx, wy] = this.screenToWorld(sx, sy);
    let closest = null, closestDist = Infinity;
    for (const n of this.sim.nodes) {
      const dx = n.x - wx, dy = n.y - wy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const hitRadius = (n.radius + 6) / this.zoom;
      if (dist < hitRadius && dist < closestDist) {
        closest = n;
        closestDist = dist;
      }
    }
    return closest;
  }

  findConstellationLabelAt(sx, sy) {
    const [wx, wy] = this.screenToWorld(sx, sy);
    for (const c of LINEAGE_DATA.constellations) {
      const members = c.artifact_ids.map(id => this.sim.nodeMap[id]).filter(Boolean);
      if (members.length < 2) continue;
      let cx = 0, cy = 0;
      members.forEach(m => { cx += m.x; cy += m.y; });
      cx /= members.length;
      cy /= members.length;
      // Label is positioned above centroid
      const ly = cy - 30;
      const dx = wx - cx, dy = wy - ly;
      if (Math.abs(dx) < 60 / this.zoom && Math.abs(dy) < 10 / this.zoom) {
        return c;
      }
    }
    return null;
  }

  bindEvents() {
    const canvas = this.canvas;

    canvas.addEventListener('mousemove', e => {
      this.mouseX = e.clientX;
      this.mouseY = e.clientY;

      if (this.isDragging) {
        if (this.dragNode) {
          const [wx, wy] = this.screenToWorld(e.clientX, e.clientY);
          this.dragNode.x = wx;
          this.dragNode.y = wy;
          this.dragNode.vx = 0;
          this.dragNode.vy = 0;
          this.sim.reheat(0.1);
        } else {
          this.panX += (e.clientX - this.dragStartX);
          this.panY += (e.clientY - this.dragStartY);
          this.dragStartX = e.clientX;
          this.dragStartY = e.clientY;
        }
        return;
      }

      const node = this.findNodeAt(e.clientX, e.clientY);
      this.hoveredNode = node;
      canvas.style.cursor = node ? 'pointer' : (this.findConstellationLabelAt(e.clientX, e.clientY) ? 'pointer' : 'grab');

      if (node) {
        this.showTooltip(node, e.clientX, e.clientY);
      } else {
        this.hideTooltip();
      }
    });

    canvas.addEventListener('mousedown', e => {
      const node = this.findNodeAt(e.clientX, e.clientY);
      if (node) {
        this.dragNode = node;
        this.isDragging = true;
        canvas.classList.add('grabbing');
        return;
      }
      this.isDragging = true;
      this.dragStartX = e.clientX;
      this.dragStartY = e.clientY;
      canvas.classList.add('grabbing');
    });

    canvas.addEventListener('mouseup', e => {
      if (this.dragNode) {
        // If barely moved, treat as click
        this.dragNode = null;
      }
      if (!this.isDragging) return;
      this.isDragging = false;
      canvas.classList.remove('grabbing');
    });

    canvas.addEventListener('click', e => {
      const node = this.findNodeAt(e.clientX, e.clientY);
      if (node) {
        this.selectedNode = this.selectedNode === node ? null : node;
        this.selectedConstellation = null;
        return;
      }
      const constellation = this.findConstellationLabelAt(e.clientX, e.clientY);
      if (constellation) {
        this.selectedConstellation = this.selectedConstellation === constellation ? null : constellation;
        this.selectedNode = null;
        return;
      }
      // Click on empty space — deselect
      this.selectedNode = null;
      this.selectedConstellation = null;
    });

    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      const factor = e.deltaY > 0 ? 0.92 : 1.08;
      const newZoom = Math.max(0.2, Math.min(5, this.zoom * factor));
      // Zoom toward cursor
      const wx = (e.clientX - this.width / 2 - this.panX) / this.zoom;
      const wy = (e.clientY - this.height / 2 - this.panY) / this.zoom;
      this.zoom = newZoom;
      this.panX = e.clientX - this.width / 2 - wx * this.zoom;
      this.panY = e.clientY - this.height / 2 - wy * this.zoom;
    }, { passive: false });

    window.addEventListener('resize', () => this.resize());

    document.addEventListener('keydown', e => {
      if (e.key === 'd' || e.key === 'D') {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        document.getElementById('sidebar').classList.toggle('open');
      }
      if (e.key === 'Escape') {
        this.selectedNode = null;
        this.selectedConstellation = null;
        document.getElementById('sidebar').classList.remove('open');
      }
    });
  }

  showTooltip(node, mx, my) {
    const tt = document.getElementById('tooltip');
    const title = document.getElementById('tt-title');
    const meta = document.getElementById('tt-meta');
    const review = document.getElementById('tt-review');

    title.textContent = node.title;

    const color = DOMAIN_COLORS[node.domain] || '#808080';
    meta.innerHTML = `<span class="domain-badge" style="background:${color}22; border:1px solid ${color}44">${node.domain}</span>`
      + `<span class="rating">Rating: <strong>${node.rating.toFixed(1)}</strong></span>`;
    review.textContent = CRITIC_SNIPPETS[node.id] || '';

    // Position tooltip near cursor
    let tx = mx + 16, ty = my - 10;
    if (tx + 360 > this.width) tx = mx - 356;
    if (ty + 140 > this.height) ty = my - 140;
    if (ty < 10) ty = 10;
    tt.style.left = tx + 'px';
    tt.style.top = ty + 'px';
    tt.classList.add('visible');
  }

  hideTooltip() {
    document.getElementById('tooltip').classList.remove('visible');
  }

  // Get set of connected node IDs for selection highlighting
  getConnected(nodeId) {
    const connected = new Set([nodeId]);
    const connectedEdges = new Set();
    LINEAGE_DATA.edges.forEach((e, i) => {
      if (e.from === nodeId || e.to === nodeId) {
        connected.add(e.from);
        connected.add(e.to);
        connectedEdges.add(i);
      }
    });
    return { connected, connectedEdges };
  }

  draw() {
    const ctx = this.ctx;
    const dpr = this.dpr;
    ctx.save();
    ctx.scale(dpr, dpr);

    // Clear
    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, this.width, this.height);

    // Subtle background stars
    this.animFrame++;
    if (!this._bgStars) {
      this._bgStars = [];
      for (let i = 0; i < 200; i++) {
        this._bgStars.push({
          x: Math.random() * 2000 - 1000,
          y: Math.random() * 2000 - 1000,
          size: Math.random() * 1.2 + 0.3,
          twinkle: Math.random() * Math.PI * 2
        });
      }
    }
    for (const star of this._bgStars) {
      const [sx, sy] = this.worldToScreen(star.x, star.y);
      if (sx < -10 || sx > this.width + 10 || sy < -10 || sy > this.height + 10) continue;
      const alpha = 0.15 + 0.1 * Math.sin(this.animFrame * 0.008 + star.twinkle);
      ctx.fillStyle = `rgba(200,200,220,${alpha})`;
      ctx.beginPath();
      ctx.arc(sx, sy, star.size, 0, Math.PI * 2);
      ctx.fill();
    }

    // Determine selection state
    let selConnected = null, selEdges = null, selConstellationIds = null;
    if (this.selectedNode) {
      const r = this.getConnected(this.selectedNode.id);
      selConnected = r.connected;
      selEdges = r.connectedEdges;
    }
    if (this.selectedConstellation) {
      selConstellationIds = new Set(this.selectedConstellation.artifact_ids);
    }
    const hasSelection = selConnected || selConstellationIds;

    // Draw constellation hulls
    for (const c of LINEAGE_DATA.constellations) {
      const members = c.artifact_ids.map(id => this.sim.nodeMap[id]).filter(Boolean);
      if (members.length < 3) continue;

      const hull = convexHull(members.map(m => ({ x: m.x, y: m.y })));
      const expanded = expandHull(hull, 35);

      let hullAlpha = 0.04;
      let strokeAlpha = 0.06;
      if (hasSelection) {
        if (selConstellationIds && c === this.selectedConstellation) {
          hullAlpha = 0.1;
          strokeAlpha = 0.15;
        } else if (selConnected) {
          const overlap = members.some(m => selConnected.has(m.id));
          hullAlpha = overlap ? 0.05 : 0.015;
          strokeAlpha = overlap ? 0.08 : 0.02;
        } else {
          hullAlpha = 0.015;
          strokeAlpha = 0.02;
        }
      }

      // Draw hull as smooth blob
      ctx.beginPath();
      if (expanded.length > 0) {
        // Catmull-Rom-ish curve through hull points
        const pts = expanded;
        const len = pts.length;
        const [sx0, sy0] = this.worldToScreen(pts[0].x, pts[0].y);
        ctx.moveTo(sx0, sy0);
        for (let i = 0; i < len; i++) {
          const p0 = pts[(i - 1 + len) % len];
          const p1 = pts[i];
          const p2 = pts[(i + 1) % len];
          const p3 = pts[(i + 2) % len];
          const [sx1, sy1] = this.worldToScreen(p1.x, p1.y);
          const [sx2, sy2] = this.worldToScreen(p2.x, p2.y);
          const [cx1s, cy1s] = this.worldToScreen(
            p1.x + (p2.x - p0.x) / 6,
            p1.y + (p2.y - p0.y) / 6
          );
          const [cx2s, cy2s] = this.worldToScreen(
            p2.x - (p3.x - p1.x) / 6,
            p2.y - (p3.y - p1.y) / 6
          );
          ctx.bezierCurveTo(cx1s, cy1s, cx2s, cy2s, sx2, sy2);
        }
      }
      ctx.closePath();

      // Get a representative color from the first member
      const repColor = members[0].color;
      const r = parseInt(repColor.slice(1, 3), 16);
      const g = parseInt(repColor.slice(3, 5), 16);
      const b = parseInt(repColor.slice(5, 7), 16);
      ctx.fillStyle = `rgba(${r},${g},${b},${hullAlpha})`;
      ctx.fill();
      ctx.strokeStyle = `rgba(${r},${g},${b},${strokeAlpha})`;
      ctx.lineWidth = 1;
      ctx.stroke();

      // Constellation label
      let cx = 0, cy = 0;
      members.forEach(m => { cx += m.x; cy += m.y; });
      cx /= members.length; cy /= members.length;
      const [lsx, lsy] = this.worldToScreen(cx, cy - 30);

      let labelAlpha = 0.3;
      if (hasSelection) {
        if (selConstellationIds && c === this.selectedConstellation) labelAlpha = 0.8;
        else if (selConnected && members.some(m => selConnected.has(m.id))) labelAlpha = 0.35;
        else labelAlpha = 0.1;
      }
      ctx.font = `${10 / Math.max(this.zoom, 0.5) * this.zoom}px -apple-system, BlinkMacSystemFont, sans-serif`;
      ctx.fillStyle = `rgba(${r},${g},${b},${labelAlpha})`;
      ctx.textAlign = 'center';
      ctx.fillText(c.name, lsx, lsy);
    }

    // Draw edges
    LINEAGE_DATA.edges.forEach((e, i) => {
      const a = this.sim.nodeMap[e.from], b = this.sim.nodeMap[e.to];
      if (!a || !b) return;
      const [ax, ay] = this.worldToScreen(a.x, a.y);
      const [bx, by] = this.worldToScreen(b.x, b.y);

      let alpha = (e.strength || 0.5) * 0.12;
      let lineWidth = 0.8;

      if (hasSelection) {
        if (selEdges && selEdges.has(i)) {
          alpha = (e.strength || 0.5) * 0.5;
          lineWidth = 1.5;
        } else if (selConstellationIds && selConstellationIds.has(e.from) && selConstellationIds.has(e.to)) {
          alpha = (e.strength || 0.5) * 0.35;
          lineWidth = 1.2;
        } else {
          alpha = 0.02;
          lineWidth = 0.5;
        }
      }

      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.lineTo(bx, by);

      if (e.relation === 'sequel') {
        ctx.strokeStyle = `rgba(168,124,108,${alpha})`;
      } else if (e.relation === 'technique') {
        ctx.strokeStyle = `rgba(108,168,168,${alpha})`;
      } else {
        ctx.strokeStyle = `rgba(180,180,200,${alpha})`;
      }
      ctx.lineWidth = lineWidth;
      ctx.stroke();
    });

    // Draw nodes
    for (const n of this.sim.nodes) {
      const [sx, sy] = this.worldToScreen(n.x, n.y);

      let nodeAlpha = 1;
      let glowIntensity = 1;
      if (hasSelection) {
        if (selConnected) {
          nodeAlpha = selConnected.has(n.id) ? 1 : 0.12;
          glowIntensity = selConnected.has(n.id) ? 1.3 : 0.3;
        } else if (selConstellationIds) {
          nodeAlpha = selConstellationIds.has(n.id) ? 1 : 0.12;
          glowIntensity = selConstellationIds.has(n.id) ? 1.3 : 0.3;
        }
      }

      const cr = parseInt(n.color.slice(1, 3), 16);
      const cg = parseInt(n.color.slice(3, 5), 16);
      const cb = parseInt(n.color.slice(5, 7), 16);

      const isHovered = n === this.hoveredNode;
      const screenRadius = n.radius * this.zoom;

      // Outer glow
      const gradient = ctx.createRadialGradient(sx, sy, 0, sx, sy, screenRadius * 3.5 * glowIntensity);
      gradient.addColorStop(0, `rgba(${cr},${cg},${cb},${0.2 * nodeAlpha * glowIntensity})`);
      gradient.addColorStop(0.4, `rgba(${cr},${cg},${cb},${0.06 * nodeAlpha * glowIntensity})`);
      gradient.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(sx, sy, screenRadius * 3.5 * glowIntensity, 0, Math.PI * 2);
      ctx.fill();

      // Core
      const coreGradient = ctx.createRadialGradient(sx, sy, 0, sx, sy, screenRadius * (isHovered ? 1.3 : 1));
      coreGradient.addColorStop(0, `rgba(${Math.min(255, cr + 80)},${Math.min(255, cg + 80)},${Math.min(255, cb + 80)},${0.95 * nodeAlpha})`);
      coreGradient.addColorStop(0.6, `rgba(${cr},${cg},${cb},${0.8 * nodeAlpha})`);
      coreGradient.addColorStop(1, `rgba(${cr},${cg},${cb},${0.4 * nodeAlpha})`);
      ctx.fillStyle = coreGradient;
      ctx.beginPath();
      ctx.arc(sx, sy, screenRadius * (isHovered ? 1.3 : 1), 0, Math.PI * 2);
      ctx.fill();

      // Bright center point
      ctx.fillStyle = `rgba(255,255,255,${0.6 * nodeAlpha})`;
      ctx.beginPath();
      ctx.arc(sx, sy, Math.max(1, screenRadius * 0.25), 0, Math.PI * 2);
      ctx.fill();

      // Hover ring
      if (isHovered) {
        ctx.strokeStyle = `rgba(${cr},${cg},${cb},0.5)`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(sx, sy, screenRadius * 1.8, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    ctx.restore();
  }
}

// ── Build sidebar content ────────────────────────────────────────
function buildSidebar() {
  const dna = LINEAGE_DATA.creative_dna;
  let html = '';

  html += '<h3>Top Motifs</h3>';
  for (const m of dna.top_motifs) {
    html += `<div class="motif-item"><span class="motif-name">${m.motif}</span><span class="motif-count">${m.count}</span></div>`;
  }

  html += '<h3>Technique Signatures</h3>';
  for (const t of dna.technique_signatures) {
    html += `<div class="technique-item">${t}</div>`;
  }

  html += '<h3>Domain Affinities</h3>';
  for (const a of dna.domain_affinities) {
    const fc = DOMAIN_COLORS[a.from_domain] || '#808080';
    const tc = DOMAIN_COLORS[a.to_domain] || '#808080';
    html += `<div class="affinity-item">`
      + `<span class="affinity-dot" style="background:${fc}"></span>`
      + `<span>${a.from_domain}</span>`
      + `<span class="affinity-arrow">&rarr;</span>`
      + `<span class="affinity-dot" style="background:${tc}"></span>`
      + `<span>${a.to_domain}</span>`
      + `<span class="affinity-count">${a.count}</span>`
      + `</div>`;
  }

  html += '<h3>Unexplored Territory</h3>';
  for (const u of dna.unexplored_territory) {
    html += `<div class="unexplored-item">${u}</div>`;
  }

  document.getElementById('sidebar-content').innerHTML = html;
}

// ── Update stats ─────────────────────────────────────────────────
function updateStats() {
  const el = document.getElementById('stats');
  el.innerHTML = `<span>${LINEAGE_DATA.nodes.length}</span> artifacts &middot; `
    + `<span>${LINEAGE_DATA.edges.length}</span> connections &middot; `
    + `<span>${LINEAGE_DATA.constellations.length}</span> constellations`;
}

// ── Main ──────────────────────────────────────────────────────────
async function boot() {
  try {
    const res = await fetch('/api/lineage');
    if (res.ok) {
      const live = await res.json();
      if (live.nodes && live.nodes.length > 0) LINEAGE_DATA = live;
    }
  } catch { /* use embedded fallback */ }

  const canvas = document.getElementById('canvas');
  const sim = new Simulation(LINEAGE_DATA.nodes, LINEAGE_DATA.edges);
  const renderer = new Renderer(canvas, sim);

  buildSidebar();
  updateStats();
}
boot();

function loop() {
  sim.tick();
  renderer.draw();
  requestAnimationFrame(loop);
}
loop();

// Fade out keyhint after 8 seconds
setTimeout(() => {
  document.getElementById('keyhint').style.opacity = '0';
}, 8000);
</script>
