<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Foundry — Observatory</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<style>
:root {
  --bg-page: #0a0a0f;
  --bg-card: #12121a;
  --bg-card-hover: #161622;
  --border: #1a1a2e;
  --text-primary: #e0e0e8;
  --text-secondary: #8888a0;
  --text-dim: #555570;
  --accent-green: #4ade80;
  --accent-red: #f87171;
  --accent-gray: #6b7280;
  --accent-blue: #60a5fa;
  --domain-poetry: #a78bfa;
  --domain-fiction: #34d399;
  --domain-code-tool: #22d3ee;
  --domain-code-game: #fb923c;
  --domain-essay: #fbbf24;
  --domain-music: #f472b6;
  --domain-experiment: #ef4444;
  --domain-worldbuilding: #2dd4bf;
  --domain-code-art: #a3e635;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg-page);
  color: var(--text-primary);
  line-height: 1.5;
  min-height: 100vh;
}

.header {
  padding: 2rem 2rem 1rem;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 1rem;
}

.header h1 {
  font-size: 1.5rem;
  font-weight: 600;
  letter-spacing: -0.02em;
}

.header h1 span {
  color: var(--text-secondary);
  font-weight: 400;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 1rem;
  font-size: 0.8rem;
  color: var(--text-secondary);
}

.auto-refresh-btn {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 0.35rem 0.75rem;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.75rem;
  transition: all 0.2s;
}

.auto-refresh-btn.active {
  border-color: var(--accent-green);
  color: var(--accent-green);
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  padding: 1rem 2rem 2rem;
}

.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.25rem;
  min-height: 200px;
}

.card.full { grid-column: 1 / -1; }

.card h2 {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 1rem;
}

.card .empty-state {
  color: var(--text-dim);
  font-style: italic;
  font-size: 0.85rem;
  text-align: center;
  padding: 2rem 0;
}

/* Activity feed */
.feed-list { list-style: none; max-height: 500px; overflow-y: auto; }

.feed-item {
  display: grid;
  grid-template-columns: 3rem 5.5rem auto auto 3.5rem;
  align-items: center;
  gap: 0.75rem;
  padding: 0.5rem 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.82rem;
  cursor: pointer;
  transition: background 0.15s;
}

.feed-item:hover { background: rgba(255,255,255,0.02); }

.feed-item .iter { color: var(--text-dim); font-variant-numeric: tabular-nums; }

.feed-item .time { color: var(--text-dim); font-size: 0.75rem; }

.feed-item .title-cell {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.feed-item .rating { text-align: right; font-variant-numeric: tabular-nums; }

.badge {
  display: inline-block;
  padding: 0.1rem 0.5rem;
  border-radius: 4px;
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
}

.badge.shipped { background: rgba(74,222,128,0.15); color: var(--accent-green); }
.badge.killed { background: rgba(248,113,113,0.15); color: var(--accent-red); }
.badge.skipped { background: rgba(107,114,128,0.15); color: var(--accent-gray); }

.domain-tag {
  display: inline-block;
  padding: 0.1rem 0.45rem;
  border-radius: 3px;
  font-size: 0.65rem;
  font-weight: 500;
  margin-left: 0.5rem;
}

.feed-review {
  display: none;
  grid-column: 1 / -1;
  padding: 0.75rem 1rem;
  font-size: 0.8rem;
  color: var(--text-secondary);
  line-height: 1.6;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.01);
}

.feed-review.open { display: block; }

/* Agent table */
.agent-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
}

.agent-table th {
  text-align: left;
  color: var(--text-dim);
  font-weight: 500;
  padding: 0.4rem 0.5rem;
  border-bottom: 1px solid var(--border);
}

.agent-table td {
  padding: 0.5rem;
  border-bottom: 1px solid var(--border);
}

.agent-table .metric {
  font-variant-numeric: tabular-nums;
  font-weight: 600;
}

.agent-table .trend {
  font-size: 0.75rem;
  color: var(--text-dim);
}

/* Project / manifesto sections */
.project-list, .manifesto-timeline {
  font-size: 0.82rem;
}

.project-item {
  padding: 0.5rem 0;
  border-bottom: 1px solid var(--border);
}

.project-item .project-name {
  font-weight: 600;
}

.project-item .project-meta {
  color: var(--text-dim);
  font-size: 0.75rem;
  margin-top: 0.15rem;
}

.manifesto-entry {
  padding: 0.5rem 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.8rem;
  color: var(--text-secondary);
}

.manifesto-entry .m-date {
  color: var(--text-dim);
  font-size: 0.72rem;
}

/* Chart containers */
.chart-wrap {
  position: relative;
  width: 100%;
  height: 280px;
}

.chart-wrap.tall { height: 350px; }

.domain-viz {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.5rem;
  height: 280px;
}

.domain-viz canvas { max-width: 100%; }

/* Token sub-charts */
.token-charts {
  display: grid;
  grid-template-columns: 1fr;
  gap: 1rem;
}

.token-charts .chart-wrap { height: 220px; }

/* Scrollbar styling */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

@media (max-width: 900px) {
  .grid { grid-template-columns: 1fr; }
  .card.full { grid-column: 1; }
  .header { padding: 1rem; }
  .grid { padding: 0.5rem 1rem 1rem; }
  .feed-item { grid-template-columns: 2.5rem 4.5rem auto auto 3rem; font-size: 0.75rem; }
  .domain-viz { grid-template-columns: 1fr; height: auto; }
}
</style>
</head>
<body>

<div class="header">
  <h1>The Foundry <span>— Observatory</span></h1>
  <div class="header-right">
    <span id="last-refresh"></span>
    <button type="button" class="auto-refresh-btn" id="auto-refresh-btn" onclick="toggleAutoRefresh()">Auto-refresh: OFF</button>
  </div>
</div>

<div class="grid">
  <!-- 1. Activity Feed -->
  <div class="card full" id="card-feed">
    <h2>Recent Activity</h2>
    <ul class="feed-list" id="feed-list"></ul>
  </div>

  <!-- 2. Quality Trends -->
  <div class="card" id="card-quality">
    <h2>Quality Trends</h2>
    <div class="chart-wrap"><canvas id="chart-quality"></canvas></div>
  </div>

  <!-- 3. Domain Distribution -->
  <div class="card" id="card-domains">
    <h2>Domain Distribution</h2>
    <div class="domain-viz">
      <canvas id="chart-domain-doughnut"></canvas>
      <canvas id="chart-domain-bar"></canvas>
    </div>
  </div>

  <!-- 4. Artifact Timeline -->
  <div class="card full" id="card-timeline">
    <h2>Artifact Timeline</h2>
    <div class="chart-wrap tall"><canvas id="chart-timeline"></canvas></div>
  </div>

  <!-- 5. Token Economics -->
  <div class="card" id="card-tokens">
    <h2>Token Economics</h2>
    <div class="token-charts">
      <div class="chart-wrap"><canvas id="chart-token-cumulative"></canvas></div>
      <div class="chart-wrap"><canvas id="chart-token-per-artifact"></canvas></div>
    </div>
  </div>

  <!-- 6. Agent Performance -->
  <div class="card" id="card-agents">
    <h2>Agent Performance</h2>
    <div id="agent-perf"></div>
  </div>

  <!-- 7. Project Tracker -->
  <div class="card" id="card-projects">
    <h2>Project Tracker</h2>
    <div class="project-list" id="project-list"></div>
  </div>

  <!-- 8. Manifesto Changelog -->
  <div class="card" id="card-manifesto">
    <h2>Manifesto Changelog</h2>
    <div class="manifesto-timeline" id="manifesto-timeline"></div>
  </div>
</div>

<script>
// ── Constants ────────────────────────────────────────────────────

const DOMAIN_COLORS = {
  'poetry': '#a78bfa',
  'fiction': '#34d399',
  'code-tool': '#22d3ee',
  'code-game': '#fb923c',
  'essay': '#fbbf24',
  'music': '#f472b6',
  'experiment': '#ef4444',
  'worldbuilding': '#2dd4bf',
  'code-art': '#a3e635',
};

const AGENT_COLORS = {
  'ideator': '#a78bfa',
  'creator': '#34d399',
  'tester': '#fb923c',
  'critic': '#f87171',
  'curator': '#60a5fa',
};

function domainColor(d) { return DOMAIN_COLORS[d] || '#6b7280'; }
function agentColor(a) { return AGENT_COLORS[a] || '#6b7280'; }
function baseAgent(a) { return a.replace(/-retry\d+$/, ''); }

// ── Chart.js defaults ────────────────────────────────────────────

Chart.defaults.color = '#8888a0';
Chart.defaults.borderColor = '#1a1a2e';
Chart.defaults.font.family = "'Inter', system-ui, sans-serif";
Chart.defaults.font.size = 11;
Chart.defaults.plugins.legend.labels.boxWidth = 12;
Chart.defaults.plugins.legend.labels.padding = 12;

// ── State ────────────────────────────────────────────────────────

let autoRefreshInterval = null;
let charts = {};

// ── Data fetching ────────────────────────────────────────────────

async function fetchAll() {
  const [iterations, tokenUsage, decisions, testReports, portfolio, manifesto, journal] =
    await Promise.all([
      fetch('/api/iterations').then(r => r.json()).catch(() => []),
      fetch('/api/token-usage').then(r => r.json()).catch(() => []),
      fetch('/api/decisions').then(r => r.json()).catch(() => []),
      fetch('/api/test-reports').then(r => r.json()).catch(() => []),
      fetch('/api/portfolio').then(r => r.json()).catch(() => ({ content: '' })),
      fetch('/api/manifesto').then(r => r.json()).catch(() => ({ content: '' })),
      fetch('/api/journal').then(r => r.json()).catch(() => ({ content: '' })),
    ]);
  return { iterations, tokenUsage, decisions, testReports, portfolio, manifesto, journal };
}

// ── Helpers ──────────────────────────────────────────────────────

function timeAgo(ts) {
  const diff = Date.now() - new Date(ts).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  return days + 'd ago';
}

function destroyChart(key) {
  if (charts[key]) { charts[key].destroy(); charts[key] = null; }
}

// ── 1. Activity Feed ─────────────────────────────────────────────

function renderActivityFeed(iterations) {
  const el = document.getElementById('feed-list');
  if (!iterations.length) {
    el.innerHTML = '<li class="empty-state">No iterations recorded yet</li>';
    return;
  }
  const recent = iterations.slice(-20).reverse();
  el.innerHTML = recent.map((it, i) => {
    const rating = it.outcome === 'shipped' && it.mean_rating ? it.mean_rating : '';
    const domColor = domainColor(it.domain);
    return `
      <li class="feed-item" onclick="toggleReview(${i})">
        <span class="iter">#${it.iteration}</span>
        <span class="time">${timeAgo(it.timestamp)}</span>
        <span class="title-cell">
          <span class="badge ${it.outcome}">${it.outcome}</span>
          ${it.title || '—'}
          <span class="domain-tag" style="background:${domColor}22;color:${domColor}">${it.domain || '?'}</span>
        </span>
        <span></span>
        <span class="rating">${rating}</span>
      </li>
      <div class="feed-review" id="review-${i}">${it.review || it.reason || 'No review available.'}</div>
    `;
  }).join('');
}

function toggleReview(i) {
  const el = document.getElementById('review-' + i);
  if (el) el.classList.toggle('open');
}

// ── 2. Quality Trends ────────────────────────────────────────────

function renderQualityTrends(iterations) {
  destroyChart('quality');
  const shipped = iterations.filter(it => it.outcome === 'shipped' && it.mean_rating);
  if (!shipped.length) {
    document.getElementById('chart-quality').parentElement.innerHTML = '<div class="empty-state">No shipped artifacts yet</div>';
    return;
  }

  const labels = shipped.map(it => '#' + it.iteration);
  const scores = shipped.map(it => parseFloat(it.mean_rating));

  // Rolling 5-iteration average
  const rolling = scores.map((_, i) => {
    const window = scores.slice(Math.max(0, i - 4), i + 1);
    return window.reduce((a, b) => a + b, 0) / window.length;
  });

  // Rejection rate per iteration (from all iterations, not just shipped)
  const iterNums = [...new Set(iterations.map(it => it.iteration))].sort((a, b) => a - b);
  const rejectionLabels = iterNums.map(n => '#' + n);
  const rejectionRates = [];
  let totalKilled = 0;
  let totalIter = 0;
  for (const num of iterNums) {
    totalIter++;
    const entry = iterations.find(it => it.iteration === num);
    if (entry && entry.outcome === 'killed') totalKilled++;
    rejectionRates.push((totalKilled / totalIter) * 100);
  }

  charts.quality = new Chart(document.getElementById('chart-quality'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'Mean Rating',
          data: scores,
          borderColor: '#a78bfa',
          backgroundColor: '#a78bfa44',
          pointBackgroundColor: '#a78bfa',
          pointRadius: 4,
          tension: 0.2,
          yAxisID: 'y',
        },
        {
          label: 'Rolling Avg (5)',
          data: rolling,
          borderColor: '#60a5fa',
          borderDash: [5, 3],
          pointRadius: 0,
          tension: 0.3,
          yAxisID: 'y',
        },
        {
          label: 'Kill Rate %',
          data: rejectionRates.slice(0, shipped.length),
          borderColor: '#f8717144',
          backgroundColor: '#f8717118',
          fill: true,
          pointRadius: 0,
          tension: 0.3,
          yAxisID: 'y1',
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      scales: {
        y: {
          min: 1, max: 5,
          title: { display: true, text: 'Score' },
          grid: { color: '#1a1a2e' },
        },
        y1: {
          position: 'right',
          min: 0, max: 100,
          title: { display: true, text: 'Kill Rate %' },
          grid: { drawOnChartArea: false },
        },
      },
      plugins: { legend: { position: 'bottom' } },
    },
  });
}

// ── 3. Domain Distribution ───────────────────────────────────────

function renderDomainDistribution(iterations) {
  destroyChart('domainDoughnut');
  destroyChart('domainBar');

  const shipped = iterations.filter(it => it.outcome === 'shipped');
  if (!shipped.length) {
    document.getElementById('chart-domain-doughnut').parentElement.innerHTML = '<div class="empty-state">No data yet</div>';
    return;
  }

  // All-time counts
  const allCounts = {};
  shipped.forEach(it => { allCounts[it.domain] = (allCounts[it.domain] || 0) + 1; });
  const domains = Object.keys(allCounts).sort();

  charts.domainDoughnut = new Chart(document.getElementById('chart-domain-doughnut'), {
    type: 'doughnut',
    data: {
      labels: domains,
      datasets: [{
        data: domains.map(d => allCounts[d]),
        backgroundColor: domains.map(d => domainColor(d)),
        borderWidth: 0,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '55%',
      plugins: {
        legend: { position: 'bottom', labels: { padding: 8, font: { size: 10 } } },
        title: { display: true, text: 'All Time', color: '#8888a0', font: { size: 11, weight: 'normal' } },
      },
    },
  });

  // Recent (last 50)
  const recent = shipped.slice(-50);
  const recentCounts = {};
  recent.forEach(it => { recentCounts[it.domain] = (recentCounts[it.domain] || 0) + 1; });
  const recentDomains = Object.keys(recentCounts).sort((a, b) => recentCounts[b] - recentCounts[a]);

  charts.domainBar = new Chart(document.getElementById('chart-domain-bar'), {
    type: 'bar',
    data: {
      labels: recentDomains,
      datasets: [{
        data: recentDomains.map(d => recentCounts[d]),
        backgroundColor: recentDomains.map(d => domainColor(d) + '99'),
        borderRadius: 4,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      indexAxis: 'y',
      plugins: {
        legend: { display: false },
        title: { display: true, text: 'Last 50 Iterations', color: '#8888a0', font: { size: 11, weight: 'normal' } },
      },
      scales: {
        x: { grid: { color: '#1a1a2e' }, ticks: { stepSize: 1 } },
        y: { grid: { display: false } },
      },
    },
  });
}

// ── 4. Artifact Timeline ─────────────────────────────────────────

function renderArtifactTimeline(iterations) {
  destroyChart('timeline');
  if (!iterations.length) {
    document.getElementById('chart-timeline').parentElement.innerHTML = '<div class="empty-state">No artifacts yet</div>';
    return;
  }

  const shipped = iterations.filter(it => it.outcome === 'shipped');
  const killed = iterations.filter(it => it.outcome === 'killed');

  // Group shipped by domain for separate datasets
  const domainGroups = {};
  shipped.forEach(it => {
    const d = it.domain || 'unknown';
    if (!domainGroups[d]) domainGroups[d] = [];
    const tokens = it.token_usage ? (it.token_usage.input + it.token_usage.output) : 1000;
    domainGroups[d].push({
      x: new Date(it.timestamp),
      y: parseFloat(it.mean_rating) || 0,
      r: Math.max(4, Math.min(18, Math.sqrt(tokens / 500))),
      title: it.title,
      domain: d,
      rating: it.mean_rating,
      id: it.artifact_id,
    });
  });

  const datasets = Object.entries(domainGroups).map(([domain, points]) => ({
    label: domain,
    data: points,
    backgroundColor: domainColor(domain) + '99',
    borderColor: domainColor(domain),
    borderWidth: 1,
  }));

  // Killed artifacts
  if (killed.length) {
    datasets.push({
      label: 'killed',
      data: killed.map(it => ({
        x: new Date(it.timestamp),
        y: 0.3,
        r: 5,
        title: it.title,
        domain: it.domain,
        rating: 'killed',
        id: it.artifact_id,
      })),
      backgroundColor: '#f8717155',
      borderColor: '#f87171',
      borderWidth: 2,
      pointStyle: 'crossRot',
    });
  }

  charts.timeline = new Chart(document.getElementById('chart-timeline'), {
    type: 'bubble',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: {
          type: 'time',
          time: { unit: 'hour', displayFormats: { hour: 'MMM d HH:mm' } },
          grid: { color: '#1a1a2e' },
          title: { display: true, text: 'Time' },
        },
        y: {
          min: 0, max: 5.5,
          title: { display: true, text: 'Rating' },
          grid: { color: '#1a1a2e' },
        },
      },
      plugins: {
        legend: { position: 'bottom' },
        tooltip: {
          callbacks: {
            label: (ctx) => {
              const p = ctx.raw;
              return `${p.title} [${p.domain}] — ${p.rating}`;
            },
          },
        },
      },
    },
  });
}

// ── 5. Token Economics ───────────────────────────────────────────

function renderTokenEconomics(tokenUsage, iterations) {
  destroyChart('tokenCumulative');
  destroyChart('tokenPerArtifact');

  if (!tokenUsage.length) {
    document.getElementById('chart-token-cumulative').parentElement.parentElement.innerHTML = '<div class="empty-state">No token data yet</div>';
    return;
  }

  // Cumulative by agent over iterations
  const agents = ['ideator', 'creator', 'tester', 'critic', 'curator'];
  const iterNums = [...new Set(tokenUsage.map(t => t.iteration))].sort((a, b) => a - b);

  const cumulative = {};
  agents.forEach(a => { cumulative[a] = []; });

  const running = {};
  agents.forEach(a => { running[a] = 0; });

  for (const iterNum of iterNums) {
    const entries = tokenUsage.filter(t => t.iteration === iterNum);
    entries.forEach(e => {
      const base = baseAgent(e.agent);
      if (running[base] !== undefined) {
        running[base] += (e.input_tokens || 0) + (e.output_tokens || 0);
      }
    });
    agents.forEach(a => { cumulative[a].push(running[a]); });
  }

  const cumulativeLabels = iterNums.map(n => '#' + n);

  charts.tokenCumulative = new Chart(document.getElementById('chart-token-cumulative'), {
    type: 'line',
    data: {
      labels: cumulativeLabels,
      datasets: agents.map(a => ({
        label: a,
        data: cumulative[a],
        borderColor: agentColor(a),
        backgroundColor: agentColor(a) + '22',
        fill: true,
        tension: 0.2,
        pointRadius: 0,
      })),
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      scales: {
        x: { grid: { color: '#1a1a2e' } },
        y: {
          stacked: true,
          grid: { color: '#1a1a2e' },
          title: { display: true, text: 'Cumulative Tokens' },
          ticks: {
            callback: (v) => v >= 1000000 ? (v / 1000000).toFixed(1) + 'M' : v >= 1000 ? (v / 1000).toFixed(0) + 'K' : v,
          },
        },
      },
      plugins: {
        legend: { position: 'bottom' },
        title: { display: true, text: 'Cumulative Token Spend by Agent', color: '#8888a0', font: { size: 11, weight: 'normal' } },
      },
    },
  });

  // Cost per artifact (tokens per shipped iteration)
  const shippedIters = iterations.filter(it => it.outcome === 'shipped');
  if (shippedIters.length) {
    const perArtifact = shippedIters.map(it => ({
      label: '#' + it.iteration,
      tokens: it.token_usage ? (it.token_usage.input + it.token_usage.output) : 0,
      domain: it.domain,
    }));

    charts.tokenPerArtifact = new Chart(document.getElementById('chart-token-per-artifact'), {
      type: 'bar',
      data: {
        labels: perArtifact.map(p => p.label),
        datasets: [{
          label: 'Tokens per artifact',
          data: perArtifact.map(p => p.tokens),
          backgroundColor: perArtifact.map(p => domainColor(p.domain) + '88'),
          borderRadius: 4,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          title: { display: true, text: 'Tokens per Shipped Artifact', color: '#8888a0', font: { size: 11, weight: 'normal' } },
        },
        scales: {
          x: { grid: { color: '#1a1a2e' } },
          y: {
            grid: { color: '#1a1a2e' },
            ticks: {
              callback: (v) => v >= 1000 ? (v / 1000).toFixed(0) + 'K' : v,
            },
          },
        },
      },
    });
  }
}

// ── 6. Agent Performance ─────────────────────────────────────────

function renderAgentPerformance(decisions, testReports, iterations) {
  const el = document.getElementById('agent-perf');
  if (!decisions.length && !testReports.length) {
    el.innerHTML = '<div class="empty-state">No decision data yet</div>';
    return;
  }

  const gate1 = decisions.filter(d => d.gate === 'gate1');
  const gate2 = decisions.filter(d => d.gate === 'gate2');

  // Ideator: approval rate
  const g1Total = gate1.length;
  const g1Approved = gate1.filter(d => d.decision === 'approve').length;
  const approvalRate = g1Total ? ((g1Approved / g1Total) * 100).toFixed(0) : '—';
  const g1Recent = gate1.slice(-30);
  const approvalRecent = g1Recent.length ? ((g1Recent.filter(d => d.decision === 'approve').length / g1Recent.length) * 100).toFixed(0) : '—';

  // Creator: first-pass ship rate (shipped on first try, i.e. no revisions for that iteration)
  const g2Ships = gate2.filter(d => d.decision === 'ship');
  const g2Total = gate2.length;
  // Approximate first-pass: group by iteration, check if first gate2 for that iteration was 'ship'
  const iterG2 = {};
  gate2.forEach(d => {
    if (!iterG2[d.iteration]) iterG2[d.iteration] = d.decision;
  });
  const firstPassShips = Object.values(iterG2).filter(d => d === 'ship').length;
  const firstPassTotal = Object.keys(iterG2).length;
  const firstPassRate = firstPassTotal ? ((firstPassShips / firstPassTotal) * 100).toFixed(0) : '—';

  // Tester: pass rate
  const testTotal = testReports.length;
  const testPassed = testReports.filter(t => t.outcome === 'pass').length;
  const passRate = testTotal ? ((testPassed / testTotal) * 100).toFixed(0) : '—';
  const testRecent = testReports.slice(-10);
  const passRateRecent = testRecent.length ? ((testRecent.filter(t => t.outcome === 'pass').length / testRecent.length) * 100).toFixed(0) : '—';

  // Critic: kill rate
  const killCount = gate2.filter(d => d.decision === 'kill').length;
  const killRate = g2Total ? ((killCount / g2Total) * 100).toFixed(0) : '—';
  const g2Recent = gate2.slice(-10);
  const killRecent = g2Recent.length ? ((g2Recent.filter(d => d.decision === 'kill').length / g2Recent.length) * 100).toFixed(0) : '—';

  el.innerHTML = `
    <table class="agent-table">
      <thead><tr><th>Agent</th><th>Metric</th><th>All-time</th><th>Recent</th></tr></thead>
      <tbody>
        <tr>
          <td style="color:${agentColor('ideator')}">Ideator</td>
          <td>Approval rate</td>
          <td class="metric">${approvalRate}%</td>
          <td class="trend">${approvalRecent}% (last 30)</td>
        </tr>
        <tr>
          <td style="color:${agentColor('creator')}">Creator</td>
          <td>First-pass ship rate</td>
          <td class="metric">${firstPassRate}%</td>
          <td class="trend">${firstPassTotal} iterations</td>
        </tr>
        <tr>
          <td style="color:${agentColor('tester')}">Tester</td>
          <td>Pass rate</td>
          <td class="metric">${passRate}%</td>
          <td class="trend">${passRateRecent}% (last 10)</td>
        </tr>
        <tr>
          <td style="color:${agentColor('critic')}">Critic</td>
          <td>Kill rate</td>
          <td class="metric">${killRate}%</td>
          <td class="trend">${killRecent}% (last 10)</td>
        </tr>
      </tbody>
    </table>
  `;
}

// ── 7. Project Tracker ───────────────────────────────────────────

function renderProjectTracker(portfolio) {
  const el = document.getElementById('project-list');
  const content = portfolio.content || '';
  if (!content.trim()) {
    el.innerHTML = '<div class="empty-state">No portfolio data</div>';
    return;
  }

  // Parse the portfolio index markdown table
  const lines = content.split('\n').filter(l => l.startsWith('|') && !l.startsWith('| ID') && !l.startsWith('|---'));
  if (!lines.length) {
    el.innerHTML = '<div class="empty-state">No artifacts in portfolio</div>';
    return;
  }

  const artifacts = lines.map(line => {
    const cols = line.split('|').map(c => c.trim()).filter(Boolean);
    return { id: cols[0], title: cols[1], domain: cols[2], rating: cols[3], date: cols[4], project: cols[5] };
  }).filter(a => a.id && a.id !== 'ID');

  // Group by project if any
  const withProject = artifacts.filter(a => a.project && a.project !== '—' && a.project !== '');
  const standalone = artifacts.filter(a => !a.project || a.project === '—' || a.project === '');

  let html = '';

  if (withProject.length) {
    const byProject = {};
    withProject.forEach(a => {
      if (!byProject[a.project]) byProject[a.project] = [];
      byProject[a.project].push(a);
    });
    Object.entries(byProject).forEach(([proj, arts]) => {
      html += `<div class="project-item"><span class="project-name">${proj}</span>`;
      html += `<div class="project-meta">${arts.length} artifact(s)</div></div>`;
    });
  }

  html += `<div class="project-item"><span class="project-name">Standalone Artifacts</span>`;
  html += `<div class="project-meta">${standalone.length} shipped across ${[...new Set(standalone.map(a => a.domain))].length} domains</div></div>`;

  // Domain breakdown
  const domainSummary = {};
  artifacts.forEach(a => { domainSummary[a.domain] = (domainSummary[a.domain] || 0) + 1; });
  html += '<div style="margin-top:0.75rem; font-size:0.75rem; color:var(--text-dim)">';
  Object.entries(domainSummary).sort((a, b) => b[1] - a[1]).forEach(([d, c]) => {
    html += `<span class="domain-tag" style="background:${domainColor(d)}22;color:${domainColor(d)};margin:0.15rem 0.2rem">${d}: ${c}</span>`;
  });
  html += '</div>';

  el.innerHTML = html;
}

// ── 8. Manifesto Changelog ───────────────────────────────────────

function renderManifestoChangelog(journal) {
  const el = document.getElementById('manifesto-timeline');
  const content = journal.content || '';
  if (!content.trim()) {
    el.innerHTML = '<div class="empty-state">No journal data</div>';
    return;
  }

  // Find lines mentioning manifesto
  const lines = content.split('\n');
  const manifestoEntries = [];
  let currentDate = '';

  for (const line of lines) {
    const dateMatch = line.match(/^###\s+(\S+)/);
    if (dateMatch) currentDate = dateMatch[1];

    if (/manifesto/i.test(line) && !line.startsWith('#')) {
      manifestoEntries.push({
        date: currentDate,
        text: line.replace(/^[*_-]+\s*/, '').trim(),
      });
    }
  }

  if (!manifestoEntries.length) {
    el.innerHTML = '<div class="empty-state">No manifesto changes recorded yet</div>';
    return;
  }

  el.innerHTML = manifestoEntries.map(e => `
    <div class="manifesto-entry">
      <div class="m-date">${e.date}</div>
      <div>${e.text}</div>
    </div>
  `).join('');
}

// ── Auto-refresh ─────────────────────────────────────────────────

function toggleAutoRefresh() {
  const btn = document.getElementById('auto-refresh-btn');
  if (autoRefreshInterval) {
    clearInterval(autoRefreshInterval);
    autoRefreshInterval = null;
    btn.textContent = 'Auto-refresh: OFF';
    btn.classList.remove('active');
  } else {
    autoRefreshInterval = setInterval(refreshAll, 30000);
    btn.textContent = 'Auto-refresh: ON';
    btn.classList.add('active');
  }
}

// ── Main render ──────────────────────────────────────────────────

async function refreshAll() {
  try {
    const data = await fetchAll();
    renderActivityFeed(data.iterations);
    renderQualityTrends(data.iterations);
    renderDomainDistribution(data.iterations);
    renderArtifactTimeline(data.iterations);
    renderTokenEconomics(data.tokenUsage, data.iterations);
    renderAgentPerformance(data.decisions, data.testReports, data.iterations);
    renderProjectTracker(data.portfolio);
    renderManifestoChangelog(data.journal);
    document.getElementById('last-refresh').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (err) {
    console.error('Refresh failed:', err);
  }
}

// ── Boot ─────────────────────────────────────────────────────────

refreshAll();
</script>
