<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Foundry — Observatory</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg-card:#111118;--bg-card-hover:#16161f;
  --border:#1c1c2a;--text:#d0d0d8;--text-sec:#808090;--text-dim:#505060;
  --green:#4ade80;--yellow:#fbbf24;--red:#f87171;--blue:#60a5fa;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;font-weight:300}
a{color:var(--text-sec);text-decoration:none}a:hover{color:var(--text)}

/* Header */
.header{padding:1.5rem 2rem 1rem;display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:1rem}
.header h1{font-size:1rem;font-weight:300;letter-spacing:0.18em;text-transform:uppercase;color:var(--text)}
.header h1 .dim{color:var(--text-sec)}
.header-meta{font-size:0.75rem;color:var(--text-dim);display:flex;gap:0.5rem;align-items:baseline}
.header-meta span{font-variant-numeric:tabular-nums}
nav{display:flex;gap:1.5rem;font-size:0.75rem;letter-spacing:0.08em;text-transform:uppercase}
nav a.active{color:var(--text);border-bottom:1px solid var(--text-sec)}

/* Stats row */
.stats{display:flex;gap:1rem;padding:0.5rem 2rem 1rem;flex-wrap:wrap}
.stat{flex:1;min-width:140px;background:var(--bg-card);padding:1rem 1.25rem;border-radius:8px;transition:transform 0.2s,background 0.2s;cursor:default}
.stat:hover{background:var(--bg-card-hover);transform:translateY(-1px)}
.stat-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-dim);margin-bottom:0.25rem}
.stat-value{font-size:1.75rem;font-weight:200;font-variant-numeric:tabular-nums}
.stat-sub{font-size:0.7rem;color:var(--text-sec);margin-top:0.15rem}
.stat-sparkline{height:24px;margin-top:0.35rem}

/* Main grid */
.main{display:grid;grid-template-columns:1fr 1fr;gap:1rem;padding:0 2rem 2rem}
.panel{background:var(--bg-card);border-radius:8px;padding:1.25rem;min-height:0}
.panel h2{font-size:0.7rem;font-weight:400;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-dim);margin-bottom:1rem}
.panel canvas{width:100%;display:block}

/* Timeline feed */
.feed{max-height:600px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.feed::-webkit-scrollbar{width:5px}
.feed::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.feed-item{padding:0.6rem 0;border-bottom:1px solid #151520;cursor:pointer;transition:background 0.15s}
.feed-item:hover{background:rgba(255,255,255,0.015)}
.feed-row{display:flex;align-items:baseline;gap:0.6rem;font-size:0.8rem}
.feed-iter{color:var(--text-dim);font-variant-numeric:tabular-nums;min-width:2.5rem}
.feed-icon{min-width:1rem;text-align:center}
.feed-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.feed-domain{font-size:0.6rem;padding:0.1rem 0.4rem;border-radius:3px;font-weight:500;white-space:nowrap}
.feed-rating{font-variant-numeric:tabular-nums;min-width:2rem;text-align:right;color:var(--text-sec)}
.feed-detail{display:none;padding:0.4rem 0 0.2rem 3.1rem;font-size:0.75rem;color:var(--text-sec);line-height:1.6}
.feed-detail.open{display:block}

/* Footer */
.footer{padding:1.5rem 2rem;display:flex;justify-content:space-between;align-items:baseline;font-size:0.7rem;color:var(--text-dim);flex-wrap:wrap;gap:0.5rem}

/* Empty state */
.empty{color:var(--text-dim);font-style:italic;font-size:0.8rem;text-align:center;padding:3rem 0}

/* Tooltip */
.chart-tooltip{position:absolute;background:#1a1a24;color:var(--text);font-size:0.72rem;padding:0.4rem 0.6rem;border-radius:4px;pointer-events:none;opacity:0;transition:opacity 0.15s;white-space:nowrap;z-index:10}

/* Responsive */
@media(max-width:768px){
  .main{grid-template-columns:1fr}
  .stats{flex-wrap:wrap}
  .stat{min-width:calc(50% - 0.5rem)}
  .header,.stats,.main,.footer{padding-left:1rem;padding-right:1rem}
}
</style>
</head>
<body>

<div class="header">
  <h1>The Foundry <span class="dim">— Observatory</span></h1>
  <div class="header-meta">
    <span id="h-iters"></span>
    <span id="h-since"></span>
  </div>
  <nav>
    <a href="/" class="active">Observatory</a>
    <a href="/constellation.html">Constellation Map</a>
    <a href="/evolution.html">Evolution</a>
  </nav>
</div>

<div class="stats">
  <div class="stat"><div class="stat-label">Total Iterations</div><div class="stat-value" id="s-total">—</div></div>
  <div class="stat"><div class="stat-label">Shipped</div><div class="stat-value" id="s-shipped">—</div><div class="stat-sub" id="s-shipped-pct"></div></div>
  <div class="stat"><div class="stat-label">Killed</div><div class="stat-value" id="s-killed">—</div><div class="stat-sub" id="s-killed-pct"></div></div>
  <div class="stat"><div class="stat-label">Critic Rejection Rate</div><div class="stat-value" id="s-reject">—</div></div>
  <div class="stat"><div class="stat-label">Mean Quality</div><div class="stat-value" id="s-quality">—</div><canvas class="stat-sparkline" id="s-sparkline"></canvas></div>
</div>

<div class="main">
  <div class="panel" id="p-quality">
    <h2>Quality Trend</h2>
    <div style="position:relative"><canvas id="c-quality" height="260"></canvas><div class="chart-tooltip" id="tt-quality"></div></div>
  </div>
  <div class="panel" id="p-feed">
    <h2>Recent Iterations</h2>
    <div class="feed" id="feed"></div>
  </div>
  <div class="panel" id="p-domain">
    <h2>Domain Distribution</h2>
    <div style="position:relative"><canvas id="c-domain" height="280"></canvas><div class="chart-tooltip" id="tt-domain"></div></div>
  </div>
  <div class="panel" id="p-tokens">
    <h2>Token Usage</h2>
    <div style="position:relative"><canvas id="c-tokens" height="260"></canvas><div class="chart-tooltip" id="tt-tokens"></div></div>
  </div>
</div>

<div class="footer">
  <span>The Foundry v1.0.0-rc.2</span>
  <a href="/constellation.html">Constellation Map →</a>
  <span id="f-tokens"></span>
</div>

<script>
// ── Domain colors (jewel tones matching constellation map) ──────
const DC = {
  'fiction':'#7C6CA8','poetry':'#A86C7C','essay':'#6CA87C',
  'code-tool':'#6C8CA8','code-game':'#A8926C','code-art':'#6CA8A8',
  'music':'#A87C6C','experiment':'#8C6CA8','worldbuilding':'#A8A86C'
};
function domainColor(d) {
  if (DC[d]) return DC[d];
  let h = 0; for (let i = 0; i < d.length; i++) h = d.charCodeAt(i) + ((h << 5) - h);
  return `hsl(${Math.abs(h) % 360},45%,55%)`;
}

// ── Formatting ──────────────────────────────────────────────────
function fmt(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return n.toLocaleString();
}
function pct(n, d) { return d ? (n/d*100).toFixed(1) + '%' : '—'; }
function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

// ── State ───────────────────────────────────────────────────────
let DATA = { iterations:[], tokenUsage:[], decisions:[], testReports:[] };
let refreshTimer = null;

// ── Fetch ───────────────────────────────────────────────────────
async function fetchAll() {
  const [iterations, tokenUsage, decisions, testReports] = await Promise.all([
    fetch('/api/iterations').then(r=>r.json()).catch(()=>[]),
    fetch('/api/token-usage').then(r=>r.json()).catch(()=>[]),
    fetch('/api/decisions').then(r=>r.json()).catch(()=>[]),
    fetch('/api/test-reports').then(r=>r.json()).catch(()=>[]),
  ]);
  DATA = { iterations, tokenUsage, decisions, testReports };
  render();
}

// ── Canvas utilities ────────────────────────────────────────────
function setupCanvas(canvas, w, h) {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  return ctx;
}

function getCanvasDims(canvas) {
  return { w: canvas.clientWidth, h: canvas.clientHeight };
}

// ── Render everything ───────────────────────────────────────────
function render() {
  const its = DATA.iterations;
  const shipped = its.filter(i => i.outcome === 'shipped');
  const killed = its.filter(i => i.outcome === 'killed');
  const total = its.length;

  // Header
  document.getElementById('h-iters').textContent = total ? `Iteration ${Math.max(...its.map(i=>i.iteration))}` : '';
  if (its.length) {
    const first = its.reduce((a,b) => new Date(a.timestamp) < new Date(b.timestamp) ? a : b);
    document.getElementById('h-since').textContent = 'running since ' + fmtDate(first.timestamp);
  }

  // Stats
  document.getElementById('s-total').textContent = total || '—';
  document.getElementById('s-shipped').textContent = shipped.length || '—';
  document.getElementById('s-shipped-pct').textContent = total ? pct(shipped.length, total) : '';
  document.getElementById('s-killed').textContent = killed.length || '—';
  document.getElementById('s-killed-pct').textContent = total ? pct(killed.length, total) : '';

  // Rejection rate from decisions
  const rejections = DATA.decisions.filter(d => d.decision === 'reject' || d.decision === 'kill').length;
  const totalDecisions = DATA.decisions.length;
  const rejectRate = totalDecisions ? (rejections / totalDecisions * 100) : 0;
  const rejectEl = document.getElementById('s-reject');
  rejectEl.textContent = totalDecisions ? rejectRate.toFixed(1) + '%' : '—';
  if (rejectRate > 60) rejectEl.style.color = 'var(--red)';
  else if (rejectRate > 40) rejectEl.style.color = 'var(--yellow)';
  else rejectEl.style.color = 'var(--green)';

  // Mean quality
  const shippedWithRating = shipped.filter(s => s.mean_rating != null);
  const meanQ = shippedWithRating.length
    ? shippedWithRating.reduce((a,s) => a + parseFloat(s.mean_rating), 0) / shippedWithRating.length
    : 0;
  document.getElementById('s-quality').textContent = meanQ ? meanQ.toFixed(2) : '—';

  // Quality sparkline (last 20 shipped)
  renderSparkline(shippedWithRating.slice(-20).map(s => parseFloat(s.mean_rating)));

  // Charts
  renderQualityTrend(shippedWithRating);
  renderDomainDonut(shipped);
  renderFeed(its);
  renderTokens();

  // Footer tokens
  let totalTokens = 0;
  DATA.tokenUsage.forEach(t => { totalTokens += (t.input_tokens||0) + (t.output_tokens||0); });
  document.getElementById('f-tokens').textContent = 'Total tokens: ' + fmt(totalTokens);
}

// ── Sparkline ───────────────────────────────────────────────────
function renderSparkline(values) {
  const canvas = document.getElementById('s-sparkline');
  if (!values.length) return;
  const { w, h } = { w: canvas.clientWidth || 140, h: 24 };
  const ctx = setupCanvas(canvas, w, h);
  ctx.clearRect(0, 0, w, h);

  const min = Math.min(...values) - 0.2;
  const max = Math.max(...values) + 0.2;
  const range = max - min || 1;
  const step = values.length > 1 ? w / (values.length - 1) : w / 2;

  ctx.beginPath();
  ctx.strokeStyle = '#6CA8A8';
  ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round';
  values.forEach((v, i) => {
    const x = i * step;
    const y = h - ((v - min) / range) * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Dot on last value
  const lastX = (values.length - 1) * step;
  const lastY = h - ((values[values.length - 1] - min) / range) * h;
  ctx.beginPath();
  ctx.arc(lastX, lastY, 2, 0, Math.PI * 2);
  ctx.fillStyle = '#6CA8A8';
  ctx.fill();
}

// ── Quality Trend Chart ─────────────────────────────────────────
function renderQualityTrend(shipped) {
  const canvas = document.getElementById('c-quality');
  const tooltip = document.getElementById('tt-quality');
  const { w } = getCanvasDims(canvas);
  const h = 260;
  const ctx = setupCanvas(canvas, w, h);
  ctx.clearRect(0, 0, w, h);

  if (!shipped.length) {
    ctx.fillStyle = '#505060';
    ctx.font = '13px -apple-system, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Awaiting first iteration...', w/2, h/2);
    return;
  }

  const pad = { top: 20, right: 20, bottom: 35, left: 40 };
  const cw = w - pad.left - pad.right;
  const ch = h - pad.top - pad.bottom;
  const iters = shipped.map(s => s.iteration);
  const ratings = shipped.map(s => parseFloat(s.mean_rating));
  const minI = Math.min(...iters);
  const maxI = Math.max(...iters);
  const rangeI = maxI - minI || 1;

  function x(iter) { return pad.left + ((iter - minI) / rangeI) * cw; }
  function y(rating) { return pad.top + (1 - (rating - 1) / 4) * ch; } // 1-5 scale

  // Zone fills
  // Red zone: 1-3
  ctx.fillStyle = 'rgba(248,113,113,0.04)';
  ctx.fillRect(pad.left, y(3), cw, y(1) - y(3));
  // Yellow zone: 3-4
  ctx.fillStyle = 'rgba(251,191,36,0.04)';
  ctx.fillRect(pad.left, y(4), cw, y(3) - y(4));
  // Green zone: 4-5
  ctx.fillStyle = 'rgba(74,222,128,0.04)';
  ctx.fillRect(pad.left, y(5), cw, y(4) - y(5));

  // Grid lines
  ctx.strokeStyle = '#1c1c2a';
  ctx.lineWidth = 1;
  for (let r = 1; r <= 5; r++) {
    const yy = y(r);
    ctx.beginPath(); ctx.moveTo(pad.left, yy); ctx.lineTo(w - pad.right, yy); ctx.stroke();
    ctx.fillStyle = '#505060';
    ctx.font = '10px -apple-system, system-ui, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(r.toString(), pad.left - 8, yy + 3);
  }

  // X axis labels (sample a few)
  ctx.fillStyle = '#505060';
  ctx.textAlign = 'center';
  ctx.font = '10px -apple-system, system-ui, sans-serif';
  const labelCount = Math.min(iters.length, 8);
  const labelStep = Math.max(1, Math.floor(iters.length / labelCount));
  for (let i = 0; i < iters.length; i += labelStep) {
    ctx.fillText('#' + iters[i], x(iters[i]), h - pad.bottom + 18);
  }

  // Trend line (linear regression)
  if (shipped.length >= 2) {
    const n = shipped.length;
    let sx=0,sy=0,sxx=0,sxy=0;
    for (let i=0;i<n;i++){sx+=iters[i];sy+=ratings[i];sxx+=iters[i]*iters[i];sxy+=iters[i]*ratings[i];}
    const slope=(n*sxy-sx*sy)/(n*sxx-sx*sx);
    const intercept=(sy-slope*sx)/n;
    ctx.strokeStyle = 'rgba(108,168,168,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(x(minI), y(slope * minI + intercept));
    ctx.lineTo(x(maxI), y(slope * maxI + intercept));
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Data line
  ctx.strokeStyle = '#6CA8A8';
  ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  shipped.forEach((s, i) => {
    const px = x(s.iteration), py = y(parseFloat(s.mean_rating));
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  });
  ctx.stroke();

  // Dots
  shipped.forEach(s => {
    const px = x(s.iteration), py = y(parseFloat(s.mean_rating));
    const rating = parseFloat(s.mean_rating);
    ctx.beginPath();
    ctx.arc(px, py, 3, 0, Math.PI * 2);
    ctx.fillStyle = rating >= 4 ? '#4ade80' : rating >= 3 ? '#fbbf24' : '#f87171';
    ctx.fill();
  });

  // Hit-test data for tooltip
  const hitData = shipped.map(s => ({
    x: x(s.iteration), y: y(parseFloat(s.mean_rating)),
    iter: s.iteration, rating: parseFloat(s.mean_rating), title: s.title
  }));

  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    let closest = null, closestDist = Infinity;
    for (const d of hitData) {
      const dist = Math.hypot(d.x - mx, d.y - my);
      if (dist < closestDist && dist < 30) { closest = d; closestDist = dist; }
    }
    if (closest) {
      tooltip.style.opacity = '1';
      tooltip.style.left = (closest.x + 10) + 'px';
      tooltip.style.top = (closest.y - 30) + 'px';
      tooltip.textContent = `#${closest.iter}: ${closest.rating.toFixed(2)} — ${closest.title || ''}`;
    } else {
      tooltip.style.opacity = '0';
    }
  };
  canvas.onmouseleave = () => { tooltip.style.opacity = '0'; };
}

// ── Domain Donut ────────────────────────────────────────────────
function renderDomainDonut(shipped) {
  const canvas = document.getElementById('c-domain');
  const tooltip = document.getElementById('tt-domain');
  const { w } = getCanvasDims(canvas);
  const h = 280;
  const ctx = setupCanvas(canvas, w, h);
  ctx.clearRect(0, 0, w, h);

  if (!shipped.length) {
    ctx.fillStyle = '#505060';
    ctx.font = '13px -apple-system, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Awaiting first iteration...', w/2, h/2);
    return;
  }

  // Count by domain
  const counts = {};
  shipped.forEach(s => { counts[s.domain] = (counts[s.domain]||0) + 1; });
  const entries = Object.entries(counts).sort((a,b) => b[1] - a[1]);
  const total = shipped.length;

  // Draw donut on left side, legend on right
  const cx = Math.min(w * 0.3, 130);
  const cy = h / 2;
  const outerR = Math.min(cx - 15, cy - 20);
  const innerR = outerR * 0.55;

  // Arcs
  let angle = -Math.PI / 2;
  const slices = [];
  entries.forEach(([domain, count]) => {
    const sweep = (count / total) * Math.PI * 2;
    const color = domainColor(domain);
    ctx.beginPath();
    ctx.moveTo(cx + innerR * Math.cos(angle), cy + innerR * Math.sin(angle));
    ctx.arc(cx, cy, outerR, angle, angle + sweep);
    ctx.arc(cx, cy, innerR, angle + sweep, angle, true);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.85;
    ctx.fill();
    ctx.globalAlpha = 1;
    slices.push({ domain, count, startAngle: angle, endAngle: angle + sweep, color });
    angle += sweep;
  });

  // Center text
  ctx.fillStyle = var_text();
  ctx.font = '600 22px -apple-system, system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(total.toString(), cx, cy + 2);
  ctx.font = '10px -apple-system, system-ui, sans-serif';
  ctx.fillStyle = '#808090';
  ctx.fillText('shipped', cx, cy + 18);

  // Legend
  const legendX = Math.min(w * 0.55, cx * 2 + 30);
  const legendY = 20;
  const lineH = Math.min(24, (h - 40) / entries.length);
  ctx.textAlign = 'left';
  entries.forEach(([domain, count], i) => {
    const yy = legendY + i * lineH + lineH / 2;
    ctx.fillStyle = domainColor(domain);
    ctx.beginPath();
    ctx.arc(legendX, yy, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#c0c0c8';
    ctx.font = '11px -apple-system, system-ui, sans-serif';
    ctx.fillText(domain, legendX + 12, yy + 4);
    ctx.fillStyle = '#808090';
    ctx.font = '10px -apple-system, system-ui, sans-serif';
    const countText = `${count} (${pct(count, total)})`;
    ctx.fillText(countText, legendX + 12 + ctx.measureText(domain).width + 8, yy + 4);
  });

  // Tooltip hover
  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const dx = mx - cx, dy = my - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist >= innerR && dist <= outerR) {
      let a = Math.atan2(dy, dx);
      if (a < -Math.PI/2) a += Math.PI * 2;
      const hit = slices.find(s => a >= s.startAngle && a < s.endAngle);
      if (hit) {
        tooltip.style.opacity = '1';
        tooltip.style.left = (mx + 12) + 'px';
        tooltip.style.top = (my - 20) + 'px';
        tooltip.textContent = `${hit.domain}: ${hit.count} (${pct(hit.count, total)})`;
        return;
      }
    }
    tooltip.style.opacity = '0';
  };
  canvas.onmouseleave = () => { tooltip.style.opacity = '0'; };
}

function var_text() { return '#d0d0d8'; }

// ── Feed ────────────────────────────────────────────────────────
function renderFeed(iterations) {
  const el = document.getElementById('feed');
  if (!iterations.length) {
    el.innerHTML = '<div class="empty">Awaiting first iteration...</div>';
    return;
  }

  const recent = iterations.slice(-20).reverse();
  el.innerHTML = recent.map((it, i) => {
    const icon = it.outcome === 'shipped' ? '✓' : it.outcome === 'killed' ? '✗' : '—';
    const iconColor = it.outcome === 'shipped' ? 'var(--green)' : it.outcome === 'killed' ? 'var(--red)' : 'var(--text-dim)';
    const dc = domainColor(it.domain || 'unknown');
    const rating = (it.outcome === 'shipped' && it.mean_rating != null) ? parseFloat(it.mean_rating).toFixed(2) : '';
    const review = it.review || '';
    return `<div class="feed-item" onclick="toggleFeedDetail(this)">
      <div class="feed-row">
        <span class="feed-iter">#${it.iteration}</span>
        <span class="feed-icon" style="color:${iconColor}">${icon}</span>
        <span class="feed-title">${it.title || '—'}</span>
        <span class="feed-domain" style="background:${dc}18;color:${dc}">${it.domain || '?'}</span>
        <span class="feed-rating">${rating}</span>
      </div>
      ${review ? `<div class="feed-detail" data-full="${escAttr(review)}" data-short="${escAttr(review.slice(0,150))}">${escHtml(review.slice(0,150))}${review.length > 150 ? '...' : ''}</div>` : ''}
    </div>`;
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return escHtml(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function toggleFeedDetail(el) {
  const detail = el.querySelector('.feed-detail');
  if (!detail) return;
  const isOpen = detail.classList.toggle('open');
  if (isOpen) {
    detail.innerHTML = escHtml(detail.dataset.full);
  } else {
    const short = detail.dataset.short;
    detail.innerHTML = escHtml(short) + (detail.dataset.full.length > 150 ? '...' : '');
  }
}

// ── Token Usage Chart ───────────────────────────────────────────
function renderTokens() {
  const canvas = document.getElementById('c-tokens');
  const tooltip = document.getElementById('tt-tokens');
  const { w } = getCanvasDims(canvas);
  const h = 260;
  const ctx = setupCanvas(canvas, w, h);
  ctx.clearRect(0, 0, w, h);

  // Aggregate by iteration
  const byIter = {};
  DATA.tokenUsage.forEach(t => {
    const iter = t.iteration;
    if (!byIter[iter]) byIter[iter] = 0;
    byIter[iter] += (t.input_tokens || 0) + (t.output_tokens || 0);
  });

  // Also try iterations data for token_usage
  DATA.iterations.forEach(it => {
    if (it.token_usage) {
      const iter = it.iteration;
      if (!byIter[iter]) byIter[iter] = 0;
      byIter[iter] += (it.token_usage.input || 0) + (it.token_usage.output || 0);
    }
  });

  const iterNums = Object.keys(byIter).map(Number).sort((a,b) => a - b).slice(-50);
  if (!iterNums.length) {
    ctx.fillStyle = '#505060';
    ctx.font = '13px -apple-system, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Awaiting token data...', w/2, h/2);
    return;
  }

  const values = iterNums.map(n => byIter[n]);
  const maxVal = Math.max(...values) || 1;

  const pad = { top: 15, right: 15, bottom: 35, left: 50 };
  const cw = w - pad.left - pad.right;
  const ch = h - pad.top - pad.bottom;
  const barW = Math.max(2, Math.min(12, (cw / iterNums.length) * 0.7));
  const gap = cw / iterNums.length;

  // Y grid
  ctx.strokeStyle = '#1c1c2a';
  ctx.lineWidth = 1;
  ctx.fillStyle = '#505060';
  ctx.font = '10px -apple-system, system-ui, sans-serif';
  ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const yy = pad.top + (ch * i / 4);
    const val = maxVal * (1 - i / 4);
    ctx.beginPath(); ctx.moveTo(pad.left, yy); ctx.lineTo(w - pad.right, yy); ctx.stroke();
    ctx.fillText(fmt(Math.round(val)), pad.left - 8, yy + 3);
  }

  // Bars
  const hitBars = [];
  iterNums.forEach((iter, i) => {
    const bx = pad.left + i * gap + (gap - barW) / 2;
    const bh = (values[i] / maxVal) * ch;
    const by = pad.top + ch - bh;
    ctx.fillStyle = 'rgba(108,140,168,0.6)';
    ctx.fillRect(bx, by, barW, bh);
    hitBars.push({ x: bx, y: by, w: barW, h: bh, iter, tokens: values[i] });
  });

  // X labels
  ctx.fillStyle = '#505060';
  ctx.textAlign = 'center';
  ctx.font = '10px -apple-system, system-ui, sans-serif';
  const xlabelStep = Math.max(1, Math.floor(iterNums.length / 8));
  for (let i = 0; i < iterNums.length; i += xlabelStep) {
    const bx = pad.left + i * gap + gap / 2;
    ctx.fillText('#' + iterNums[i], bx, h - pad.bottom + 18);
  }

  // Tooltip
  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const hit = hitBars.find(b => mx >= b.x && mx <= b.x + b.w + 4 && my >= b.y && my <= b.y + b.h);
    if (hit) {
      tooltip.style.opacity = '1';
      tooltip.style.left = (mx + 12) + 'px';
      tooltip.style.top = (my - 20) + 'px';
      tooltip.textContent = `#${hit.iter}: ${fmt(hit.tokens)} tokens`;
    } else {
      tooltip.style.opacity = '0';
    }
  };
  canvas.onmouseleave = () => { tooltip.style.opacity = '0'; };
}

// ── Auto-refresh ────────────────────────────────────────────────
function startAutoRefresh() {
  if (refreshTimer) return;
  refreshTimer = setInterval(fetchAll, 30000);
}
startAutoRefresh();

// ── Handle resize ───────────────────────────────────────────────
let resizeTimeout;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(render, 150);
});

// ── Init ────────────────────────────────────────────────────────
fetchAll();
</script>
