mcp:
  news:
    server: "tavily"
    query_template: "interesting unusual news today"
    max_items: 5
    refresh_interval: 15

  random_knowledge:
    server: "context7"
    strategy: "random"
    max_items: 3
    refresh_interval: 10

  cultural:
    server: "tavily"
    queries:
      - "trending github repos this week"
      - "most discussed books this month"
    max_items: 5
    refresh_interval: 20

stimuli_ttl: 30
skills_per_context: 2
